name: Docs Links

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "23 10 * * 1"
  workflow_dispatch:
    inputs:
      check_external_links:
        description: Check external HTTP links
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-links:
    name: Documentation links
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check Markdown links
        shell: bash
        env:
          CHECK_EXTERNAL_LINKS: ${{ github.event.inputs.check_external_links || 'false' }}
        run: node scripts/check-doc-links.mjs
