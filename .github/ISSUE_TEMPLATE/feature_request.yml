name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user need, workflow, or limitation should this address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, interface, or outcome you would like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Share other approaches or workarounds if relevant.
    validations:
      required: false
  - type: dropdown
    id: contribution
    attributes:
      label: Are you willing to help implement this?
      options:
        - "Yes"
        - "No"
        - "Not sure"
    validations:
      required: false
